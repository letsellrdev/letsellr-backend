name: Production Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: github.repository == 'letsellrdev/letsellr-backend'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # This is the "Magic" step that talks to your EC2
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Enter the project folder
            cd ~/letsellr-backend
            
            # 2. Pull the latest code from GitHub
            git pull origin main
            
            # 3. Install production dependencies using NPM
            # --omit=dev ensures we don't waste memory on testing tools
            npm install --omit=dev
            
            # 4. Restart the Express server
            # We use the name 'letsellr-backend' to match your PM2 process
            pm2 restart letsellr-backend || pm2 start app.js --name "letsellr-backend"

            # 5. Keep the process list updated for reboots
            pm2 save